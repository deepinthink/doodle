name: CI Maven

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Checkout deepinthink/amoeba
        uses: actions/checkout@v4
        with:
          repository: deepinthink/amoeba
          path: deepinthink/amoeba

      - name: Build && Install amoeba-maven
        run: cd deepinthink/amoeba/tools/buildtools/java/amoeba-maven && ./mvnw install -B

      - name: Build && Install amoeba-external
        run: cd deepinthink/amoeba/infrastructure/external/java/amoeba-external && ./mvnw install -B

      - name: Build && Install amoeba-spring-boot
        run: cd deepinthink/amoeba/infrastructure/framework/java/amoeba-spring-boot && ./mvnw install -B

      - name: Build && Install doodle-spring-game
        run: cd infrastructure/framework/java/doodle-spring-game && ./mvnw install -B

      - name: Build && Install doodle-specification-component
        run: cd specification/component/java/doodle-specification-component && ./mvnw install -B

      - name: Build && Install doodle-specification-game
        run: cd specification/game/java/doodle-specification-game && ./mvnw install -B

      - name: Build && Install doodle-specification-service
        run: cd specification/service/java/doodle-specification-service && ./mvnw install -B

      - name: Build && Install doodle-spring-game-component
        run: cd infrastructure/component/java/doodle-spring-game-component && ./mvnw install -B

      - name: Build && Install doodle-spring-game-service
        run: cd infrastructure/service/java/doodle-spring-game-service && ./mvnw install -B

      - name: Build && Install doodle-spring-game-chess
        run: cd templates/chess/java/doodle-spring-game-chess && ./mvnw install -B

      - name: Build && Install doodle-spring-game-idle
        run: cd templates/idle/java/doodle-spring-game-idle && ./mvnw install -B

